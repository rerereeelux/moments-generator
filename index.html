<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLQC Moments Generator</title>

  <!-- Bebas Neue -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">

  <!-- html2canvas for PNG export -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    .moments-screen,
    .moments-screen * {
      -webkit-text-fill-color: unset !important;
    }
.moments-screen,
    .moments-screen input,
    .moments-screen textarea,
    .moments-screen button,
    .name,
    .main-text,
    .comment-line,
    .comment-name,
    .reply-at,
    .reply-target {
      font-family: "Assistant", "Helvetica Neue", Arial, sans-serif !important;
    }



    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #e9e6ea;
      color: #6f6a6e;
      display: flex;
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      width: 100%;
    }

    .controls {
      padding: 24px;
      background: #fff;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      height: 100vh;
    }

    .controls h2 {
      margin: 0 0 18px;
      font-size: 22px;
      color: #444;
    }

    .controls label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #555;
    }

    .controls input,
    .controls textarea,
    .controls button {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      border: 1px solid #d6d6d6;
      border-radius: 10px;
      outline: none;
    }

    .controls textarea {
      resize: vertical;
      min-height: 72px;
    }

    .controls button {
      margin-top: 18px;
      background: #d98e8a;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .controls button:hover {
      opacity: 0.94;
    }

    .preview-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px;
      overflow: auto;
      background: #ece9eb;
    }

    /* =========================
       SCREEN / PHONE POST AREA
       ========================= */
    .moments-screen {
      width: 512px;
      position: relative;
      overflow: hidden;
      background: #f5f2f4;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      padding: 26px 22px 40px 22px;
      min-height: unset;
      height: auto;
      display: inline-block;
    }

    .moments-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.76), rgba(255,255,255,0.76)),
        url("https://raw.githubusercontent.com/rerereeelux/moments-generator/main/image/phone-bg.png");
      background-size: cover;
      background-position: center;
      opacity: 1;
      z-index: 0;
    }

    .post {
      position: relative;
      z-index: 1;
    }

    .post-header {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    /* LEFT SIDE */
    .avatar-wrap {
      width: 76px;
      position: relative;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 1.5px solid rgba(255,255,255,0.85);
      background: #ddd;
      margin-left: 0;
    }

    .heart-badge-wrap {
      position: absolute;
      left: -4px;
      top: 48px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .heart-badge-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    .heart-number {
      position: relative;
      z-index: 2;
      font-family: "Bebas Neue", sans-serif;
      font-size: 19px;
      color: #fff;
      line-height: 1;
      letter-spacing: 0px;
      transform: scaleX(0.82) scaleY(0.92) translateY(1px);
      transform-origin: center;
      text-shadow:
        0 0 1px rgba(255, 255, 255, 0.85),
        0 0 2px rgba(255, 255, 255, 0.45);
    }

    /* RIGHT SIDE */
    .post-main {
      flex: 1;
      padding-top: 10px;
      margin-left: 4px;
      max-width: 350px;
    }

    .name {
      font-size: 20px;
      line-height: 1.05;
      color: #d78f8b !important;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .main-text {
      font-size: 18px;
      line-height: 1.28;
      color: #6f6a6e !important;
      font-weight: 400;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 360px;
    }

    /* ATTACHED IMAGE */
    .attached-image {
      margin-top: 22px;
      margin-left: 80px;
      width: 360px;
      max-height: 260px;
      object-fit: cover;
      display: none;
    }

    /* COMMENT BOX */
    .comment-box {
      margin-top: 22px;
      margin-left: 80px;
      width: 360px;
      background: rgba(245, 238, 245, 1);
      padding: 14px 16px;
      display: none;
      backdrop-filter: blur(1px);
    }

    .comment-line {
      font-size: 16px;
      line-height: 1.28;
      color: #7d787d !important;
      margin-bottom: 8px;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .comment-line:last-child {
      margin-bottom: 0;
    }

    .comment-name {
      color: #d78f8b !important;
      font-weight: 400;
    }

    .reply-at {
      color: #7d787d !important;
      font-weight: 400;
    }

    .reply-target {
      color: #d78f8b !important;
      font-weight: 400;
    }

    .small-note {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="controls">
      <h2>MLQC Moments Generator</h2>

      <label>Character Name</label>
      <input id="charNameInput" value="Lucien" />

      <label>Affinity Number</label>
      <input id="heartNumberInput" value="50" />

      <label>Main Post Text</label>
      <textarea id="mainTextInput">A rainbow-colored surprise.</textarea>

      <label>Avatar Image Link</label>
      <input id="avatarUrlInput" value="https://raw.githubusercontent.com/rerereeelux/moments-generator/main/image/9209.png" />

      <label>Attached Post Image Link (optional)</label>
      <input id="postImageUrlInput" placeholder="https://..." />

      <label>Comment 1 Name</label>
      <input id="comment1NameInput" value="MC" />

      <label>Comment 1 Text</label>
      <textarea id="comment1TextInput">How did you find it? I can't even remember where I hid it myself.</textarea>

      <label>Reply Name</label>
      <input id="replyNameInput" value="Lucien" />

      <label>Reply Target</label>
      <input id="replyTargetInput" value="MC" />

      <label>Reply Text</label>
      <textarea id="replyTextInput">It's a rainbow-colored secret.</textarea>

      <button id="exportHtmlBtn">Export as HTML</button>
      <button id="exportPngBtn">Export as PNG</button>

      <div class="small-note">
        Avatar uses a placeholder if empty.
      </div>
    </div>

    <div class="preview-wrap">
      <div class="moments-screen" id="previewScreen">
        <div class="post">
          <div class="post-header">
            <div class="avatar-wrap">
              <img id="avatarPreview" class="avatar" alt="avatar" />

              <div class="heart-badge-wrap">
                <img class="heart-badge-img" src="https://raw.githubusercontent.com/rerereeelux/moments-generator/main/image/heart.png" alt="heart badge" />
                <div id="heartBadge" class="heart-number">22</div>
              </div>
            </div>

            <div class="post-main">
              <div class="name" id="charNamePreview">Lucien</div>
              <div class="main-text" id="mainTextPreview">A rainbow-colored surprise.</div>
            </div>
          </div>

          <img id="postImagePreview" class="attached-image" alt="post image" />

          <div class="comment-box" id="commentBox">
            <div class="comment-line" id="comment1Preview"></div>
            <div class="comment-line" id="replyPreview"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const BG_URL = "https://raw.githubusercontent.com/rerereeelux/moments-generator/main/image/phone-bg.png";
    const HEART_URL = "https://raw.githubusercontent.com/rerereeelux/moments-generator/main/image/heart.png";
    const AVATAR_PLACEHOLDER = "https://raw.githubusercontent.com/rerereeelux/moments-generator/main/image/9209.png";

    function escapeHtml(str = "") {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function updatePreview() {
      $("charNamePreview").textContent = $("charNameInput").value || "Lucien";
      $("heartBadge").textContent = $("heartNumberInput").value || "22";
      $("mainTextPreview").textContent = $("mainTextInput").value || "";

      const avatarUrl = $("avatarUrlInput").value.trim() || AVATAR_PLACEHOLDER;
      $("avatarPreview").src = avatarUrl;

      const postImageUrl = $("postImageUrlInput").value.trim();
      $("postImagePreview").src = postImageUrl;
      $("postImagePreview").style.display = postImageUrl ? "block" : "none";

      const c1Name = $("comment1NameInput").value.trim();
      const c1Text = $("comment1TextInput").value.trim();
      const rName = $("replyNameInput").value.trim();
      const rTarget = $("replyTargetInput").value.trim();
      const rText = $("replyTextInput").value.trim();

      const hasComment1 = c1Name || c1Text;
      const hasReply = rName || rTarget || rText;
      const hasComments = hasComment1 || hasReply;

      $("commentBox").style.display = hasComments ? "block" : "none";
      $("comment1Preview").style.display = hasComment1 ? "block" : "none";
      $("replyPreview").style.display = hasReply ? "block" : "none";

      $("comment1Preview").innerHTML =
        `<span class="comment-name">${escapeHtml(c1Name)}</span> ${escapeHtml(c1Text)}`;

      $("replyPreview").innerHTML =
        `<span class="comment-name">${escapeHtml(rName)}</span> <span class="reply-at">@</span><span class="reply-target">${escapeHtml(rTarget)}</span> ${escapeHtml(rText)}`;
    }

    [
      "charNameInput",
      "heartNumberInput",
      "mainTextInput",
      "avatarUrlInput",
      "postImageUrlInput",
      "comment1NameInput",
      "comment1TextInput",
      "replyNameInput",
      "replyTargetInput",
      "replyTextInput"
    ].forEach(id => {
      $(id).addEventListener("input", updatePreview);
    });

    $("avatarPreview").src = AVATAR_PLACEHOLDER;

    $("exportHtmlBtn").addEventListener("click", () => {
      const charName = escapeHtml($("charNameInput").value || "Lucien");
      const heart = escapeHtml($("heartNumberInput").value || "22");
      const mainText = escapeHtml($("mainTextInput").value || "");

      const avatarUrl = escapeHtml($("avatarUrlInput").value.trim() || AVATAR_PLACEHOLDER);
      const postImageUrl = escapeHtml($("postImageUrlInput").value.trim());

      const c1Name = escapeHtml($("comment1NameInput").value.trim());
      const c1Text = escapeHtml($("comment1TextInput").value.trim());
      const rName = escapeHtml($("replyNameInput").value.trim());
      const rTarget = escapeHtml($("replyTargetInput").value.trim());
      const rText = escapeHtml($("replyTextInput").value.trim());

      const hasComment1 = c1Name || c1Text;
      const hasReply = rName || rTarget || rText;
      const hasComments = hasComment1 || hasReply;
      const hasPostImage = !!postImageUrl;

      const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${charName} - Moment Post</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  .moments-screen,
  .moments-screen * {
    -webkit-text-fill-color: unset !important;
  }
.moments-screen,
  .moments-screen .name,
  .moments-screen .main-text,
  .moments-screen .comment-line,
  .moments-screen .comment-name,
  .moments-screen .reply-at,
  .moments-screen .reply-target {
    font-family: "Assistant", "Helvetica Neue", Arial, sans-serif !important;
  }


  .moments-screen .name,
  .moments-screen .comment-name,
  .moments-screen .reply-target {
    color: #d78f8b !important;
  }

  .moments-screen .main-text,
  .moments-screen .comment-line,
  .moments-screen .reply-at {
    color: #6f6a6e !important;
  }


  body {
    margin: 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: transparent;
    color: #6f6a6e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .moments-screen {
    width: 512px;
    position: relative;
    overflow: hidden;
    background: #f5f2f4;
    padding: 26px 22px 40px 22px;
    min-height: unset;
    height: auto;
    display: inline-block;
  }

  .moments-screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(255,255,255,0.76), rgba(255,255,255,0.76)),
      url("${BG_URL}");
    background-size: cover;
    background-position: center;
    opacity: 1;
    z-index: 0;
  }

  .post {
    position: relative;
    z-index: 1;
  }

  .post-header {
    display: flex;
    align-items: flex-start;
    gap: 0;
  }

  .avatar-wrap {
    width: 76px;
    position: relative;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .avatar {
    width: 76px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    border: 1.5px solid rgba(255,255,255,0.85);
    background: #ddd;
    margin-left: 0;
  }

  .heart-badge-wrap {
    position: absolute;
    left: -4px;
    top: 48px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .heart-badge-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .heart-number {
    position: relative;
    z-index: 2;
    font-family: "Bebas Neue", sans-serif;
    font-size: 19px;
    color: #fff;
    line-height: 1;
    letter-spacing: 0px;
    transform: scaleX(0.82) scaleY(0.92) translateY(1px);
    transform-origin: center;
    text-shadow:
      0 0 1px rgba(255, 255, 255, 0.85),
      0 0 2px rgba(255, 255, 255, 0.45);
  }

  .post-main {
    flex: 1;
    padding-top: 10px;
    margin-left: 4px;
    max-width: 350px;
  }

  .name {
    font-size: 20px;
    line-height: 1.05;
    color: #d78f8b;
    font-weight: 400;
    margin-bottom: 6px;
  }

  .main-text {
    font-size: 18px;
    line-height: 1.28;
    color: #6f6a6e;
    font-weight: 400;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 360px;
  }

  .attached-image {
    margin-top: 22px;
    margin-left: 80px;
    width: 360px;
    max-height: 260px;
    object-fit: cover;
    display: block;
  }

  .comment-box {
    margin-top: 22px;
    margin-left: 80px;
    width: 360px;
    background: rgba(245, 238, 245, 1);
    padding: 14px 16px;
    backdrop-filter: blur(1px);
  }

  .comment-line {
    font-size: 16px;
    line-height: 1.28;
    color: #7d787d;
    margin-bottom: 8px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .comment-line:last-child {
    margin-bottom: 0;
  }

  .comment-name {
    color: #d78f8b;
    font-weight: 400;
  }

  .reply-at {
    color: #7d787d;
    font-weight: 400;
  }

  .reply-target {
    color: #d78f8b;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="moments-screen" id="exportScreen">
    <div class="post">
      <div class="post-header">
        <div class="avatar-wrap">
          <img class="avatar" src="${avatarUrl}" alt="avatar">
          <div class="heart-badge-wrap">
            <img class="heart-badge-img" src="${HEART_URL}" alt="heart badge">
            <div class="heart-number">${heart}</div>
          </div>
        </div>

        <div class="post-main">
          <div class="name">${charName}</div>
          <div class="main-text">${mainText}</div>
        </div>
      </div>

      ${hasPostImage ? `<img class="attached-image" src="${postImageUrl}" alt="post image">` : ""}

      ${hasComments ? `
      <div class="comment-box">
        ${hasComment1 ? `<div class="comment-line"><span class="comment-name">${c1Name}</span> ${c1Text}</div>` : ""}
        ${hasReply ? `<div class="comment-line"><span class="comment-name">${rName}</span> <span class="reply-at">@</span><span class="reply-target">${rTarget}</span> ${rText}</div>` : ""}
      </div>
      ` : ""}
    </div>
  </div>
</body>
</html>`;

      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "mlqc-moment-post.html";
      a.click();

      URL.revokeObjectURL(url);
    });

    $("exportPngBtn").addEventListener("click", async () => {
      const target = $("previewScreen");

      const canvas = await html2canvas(target, {
        backgroundColor: null,
        useCORS: true,
        scale: 2
      });

      const link = document.createElement("a");
      link.download = "mlqc-moment-post.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    updatePreview();
  </script>
</body>
</html>
